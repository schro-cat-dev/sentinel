syntax = "proto3";

package sentinel.v1;

option go_package = "github.com/schro-cat-dev/sentinel-server/internal/grpc/pb";

// --- Common ---

message LogTag {
  string key = 1;
  string category = 2;
}

message AIContext {
  string agent_id = 1;
  string task_id = 2;
  int32 loop_depth = 3;
  string model = 4;
  double confidence = 5;
  string reasoning_trace = 6;
}

message AgentBackLogEntry {
  string agent_id = 1;
  string action = 2;
  string timestamp = 3;
  string result = 4;
  string status = 5;
}

// --- Ingest ---

message IngestRequest {
  string trace_id = 1;
  string type = 2;
  int32 level = 3;
  string boundary = 4;
  string service_id = 5;
  bool is_critical = 6;
  string message = 7;
  string origin = 8;
  repeated LogTag tags = 9;
  string actor_id = 10;
  string span_id = 11;
  string parent_span_id = 12;
  repeated string resource_ids = 13;
  AIContext ai_context = 14;
  repeated AgentBackLogEntry agent_back_log = 15;
  string input = 16;
  bool trigger_agent = 17;
  map<string, string> details = 18;
}

message ThreatResponseSummary {
  string response_id = 1;
  string event_name = 2;
  string strategy = 3;
  bool blocked = 4;
  string block_target = 5;
  bool analyzed = 6;
  string risk_level = 7;
  bool notified = 8;
}

message IngestResponse {
  string trace_id = 1;
  bool hash_chain_valid = 2;
  bool masked = 3;
  repeated TaskResult tasks_generated = 4;
  repeated ThreatResponseSummary threat_responses = 5;
}

message TaskResult {
  string task_id = 1;
  string rule_id = 2;
  string status = 3;
  string dispatched_at = 4;
  string error = 5;
}

// --- Health Check ---

message HealthCheckRequest {}
message HealthCheckResponse {
  string status = 1;
  string version = 2;
}

// --- Task Management ---

message GetTaskStatusRequest {
  string task_id = 1;
}

message GetTaskStatusResponse {
  string task_id = 1;
  string rule_id = 2;
  string event_name = 3;
  string status = 4;
  string action_type = 5;
  string severity = 6;
  string execution_level = 7;
  string description = 8;
  string source_trace_id = 9;
  string created_at = 10;
  string updated_at = 11;
  string error_message = 12;
}

message ListTasksRequest {
  string event_name = 1;
  string status = 2;
  string from_time = 3;
  string to_time = 4;
  int32 limit = 5;
  int32 offset = 6;
}

message ListTasksResponse {
  repeated GetTaskStatusResponse tasks = 1;
  int32 total_count = 2;
}

// --- Approval Workflow ---

message ApproveTaskRequest {
  string task_id = 1;
  string approver_id = 2;
  string reason = 3;
}

message ApproveTaskResponse {
  string task_id = 1;
  string status = 2;
  string dispatched_at = 3;
  string error = 4;
}

message RejectTaskRequest {
  string task_id = 1;
  string rejector_id = 2;
  string reason = 3;
}

message RejectTaskResponse {
  string task_id = 1;
  string status = 2;
}

// --- Service ---

service SentinelService {
  rpc Ingest(IngestRequest) returns (IngestResponse);
  rpc HealthCheck(HealthCheckRequest) returns (HealthCheckResponse);
  rpc GetTaskStatus(GetTaskStatusRequest) returns (GetTaskStatusResponse);
  rpc ListTasks(ListTasksRequest) returns (ListTasksResponse);
  rpc ApproveTask(ApproveTaskRequest) returns (ApproveTaskResponse);
  rpc RejectTask(RejectTaskRequest) returns (RejectTaskResponse);
}
