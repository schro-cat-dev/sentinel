  #       message_pattern: "(?i)brute\\s*force"

anomaly:
  enabled: false                    # or SENTINEL_ANOMALY_ENABLED=true
  window_size_sec: 60
  baseline_window_sec: 600
  threshold_pct: 300.0
  min_baseline: 3.0

agent:
  enabled: false                    # or SENTINEL_AGENT_ENABLED=true
  provider: "mock"                  # or SENTINEL_AGENT_PROVIDER
  max_loop_depth: 5
  timeout_sec: 60
  allowed_actions: ["AI_ANALYZE"]
  min_severity: "HIGH"

response:
  enabled: false                    # or SENTINEL_RESPONSE_ENABLED=true
  default_strategy: "NOTIFY_ONLY"   # or SENTINEL_RESPONSE_DEFAULT_STRATEGY
  block_mode: "IMMEDIATE"           # IMMEDIATE / REQUIRE_APPROVAL
  rules: []
