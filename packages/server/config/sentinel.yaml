  #     strategy: "BLOCK_AND_NOTIFY"
  #     block_action: "block_ip"
  #     notify_targets: ["#security"]

authorization:
  enabled: false                    # or SENTINEL_AUTHZ_ENABLED=true
  default_role: "viewer"
  roles: {}
  client_roles: {}
